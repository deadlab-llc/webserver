name: Build Check
on:
  pull_request:
    branches: [master]
permissions:
  contents: write
  pull-requests: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build client-swoggerslol
        run: |
          cd client-swoggerslol
          npm install
          npm run build
      - name: Build client-deadlab
        run: |
          cd client-deadlab
          npm install
          npm run build