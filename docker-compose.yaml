name: webserver
services:
  website:
    build: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "/home/alec/swoggerslol/client-swoggerslol/public:/app/client-swoggerslol/public"
      - "/home/alec/swoggerslol/client-deadlab/public:/app/client-deadlab/public"
    env_file: .env
    networks:
      - webnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.15'
          memory: 512M
    restart: unless-stopped
networks:
  webnet:
    driver: bridge
    external: true